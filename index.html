<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Card Vault</title>
  <style>
    :root {
      --bg: #10151f;
      --card: #182233;
      --text: #f3f6fb;
      --muted: #aeb8c8;
      --accent: #4da3ff;
      --danger: #ff5c5c;
      --border: #2a3850;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    header {
      padding: 18px;
      background: #0b1018;
      border-bottom: 1px solid var(--border);
      text-align: center;
    }
    header h1 { margin: 0; font-size: 28px; }
    main { max-width: 1000px; margin: auto; padding: 16px; }
    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 18px;
    }
    label {
      display: block;
      margin-top: 10px;
      color: var(--muted);
      font-size: 14px;
    }
    input, textarea {
      width: 100%;
      padding: 11px;
      margin-top: 5px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #0f1724;
      color: var(--text);
      font-size: 15px;
    }
    textarea { resize: vertical; min-height: 70px; }
    button {
      padding: 11px 14px;
      margin-top: 12px;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
    button.secondary { background: #394961; }
    button.danger { background: var(--danger); }
    .button-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 14px;
    }
    .collector-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .collector-card img {
      width: 100%;
      height: 260px;
      object-fit: contain;
      background: #0b1018;
      display: block;
    }
    .collector-card .content { padding: 12px; }
    .collector-card h3 { margin: 0 0 6px; font-size: 18px; }
    .collector-card p { margin: 4px 0; color: var(--muted); font-size: 14px; }
    .status { margin-top: 10px; color: var(--muted); font-size: 14px; }
    .warning { color: #ffd166; font-size: 14px; margin-top: 8px; }
    .hidden { display: none; }
    #preview {
      max-width: 180px;
      max-height: 220px;
      object-fit: contain;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #0b1018;
    }
  </style>
</head>
<body>
<header>
  <h1>Card Vault</h1>
</header>

<main>
  <section class="panel">
    <h2>Add Card</h2>

    <label for="playerName">Player / Card Name</label>
    <input id="playerName" placeholder="Example: Michael Jordan" />

    <label for="year">Year</label>
    <input id="year" placeholder="Example: 1998" />

    <label for="brand">Brand / Set</label>
    <input id="brand" placeholder="Example: Fleer Ultra" />

    <label for="cardNumber">Card Number</label>
    <input id="cardNumber" placeholder="Example: #23" />

    <label for="condition">Condition</label>
    <input id="condition" placeholder="Example: Raw, PSA 9, touched corner" />

    <label for="notes">Notes</label>
    <textarea id="notes" placeholder="Add trade notes, value, condition notes, etc."></textarea>

    <label for="photo">Card Picture</label>
    <input id="photo" type="file" accept="image/*" capture="environment" />
    <img id="preview" class="hidden" alt="Card preview" />

    <div class="button-row">
      <button id="saveCardBtn">Save Card</button>
      <button class="secondary" id="clearFormBtn" type="button">Clear Form</button>
    </div>

    <div id="status" class="status"></div>
    <div class="warning">
      Version 2.0: Uses IndexedDB instead of localStorage so pictures can store properly.
    </div>
  </section>

  <section class="panel">
    <h2>Backup / Restore</h2>
    <p class="status">Export saves your full card list and pictures into a backup file.</p>
    <div class="button-row">
      <button class="secondary" id="exportBtn">Export Backup</button>
      <button class="secondary" id="importBtn">Import Backup</button>
      <input id="importFile" class="hidden" type="file" accept="application/json" />
    </div>
  </section>

  <section class="panel">
    <h2>My Cards</h2>
    <div id="cardCount" class="status"></div>
    <div id="cards" class="card-grid"></div>
  </section>
</main>

<script>
  const DB_NAME = "CardVaultDB";
  const DB_VERSION = 1;
  const STORE_NAME = "cards";
  const OLD_STORAGE_KEY = "cards";

  const fields = {
    playerName: document.getElementById("playerName"),
    year: document.getElementById("year"),
    brand: document.getElementById("brand"),
    cardNumber: document.getElementById("cardNumber"),
    condition: document.getElementById("condition"),
    notes: document.getElementById("notes"),
    photo: document.getElementById("photo"),
    preview: document.getElementById("preview"),
    status: document.getElementById("status"),
    cards: document.getElementById("cards"),
    cardCount: document.getElementById("cardCount")
  };

  let db;
  let cards = [];
  let compressedImage = "";

  function openDB() {
    return new Promise((resolve, reject) => {
      const request = indexedDB.open(DB_NAME, DB_VERSION);

      request.onupgradeneeded = event => {
        const database = event.target.result;
        if (!database.objectStoreNames.contains(STORE_NAME)) {
          database.createObjectStore(STORE_NAME, { keyPath: "id" });
        }
      };

      request.onsuccess = event => {
        db = event.target.result;
        resolve(db);
      };

      request.onerror = event => reject(event.target.error);
    });
  }

  function getAllCards() {
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_NAME, "readonly");
      const store = tx.objectStore(STORE_NAME);
      const request = store.getAll();

      request.onsuccess = () => {
        const results = request.result || [];
        results.sort((a, b) => b.id - a.id);
        resolve(results);
      };

      request.onerror = () => reject(request.error);
    });
  }

  function putCard(card) {
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_NAME, "readwrite");
      const store = tx.objectStore(STORE_NAME);
      const request = store.put(card);

      request.onsuccess = () => resolve();
      request.onerror = () => reject(request.error);
    });
  }

  function deleteCardFromDB(id) {
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_NAME, "readwrite");
      const store = tx.objectStore(STORE_NAME);
      const request = store.delete(id);

      request.onsuccess = () => resolve();
      request.onerror = () => reject(request.error);
    });
  }

  async function migrateOldLocalStorageCards() {
    try {
      const oldData = localStorage.getItem(OLD_STORAGE_KEY);
      if (!oldData) return;

      const oldCards = JSON.parse(oldData);
      if (!Array.isArray(oldCards) || oldCards.length === 0) return;

      const existingCards = await getAllCards();
      if (existingCards.length > 0) return;

      for (const card of oldCards) {
        if (!card.id) card.id = Date.now() + Math.random();
        await putCard(card);
      }

      fields.status.textContent = "Old saved cards were moved into the new storage system.";
    } catch (error) {
      console.error("Migration skipped:", error);
    }
  }

  function resizeImage(file, maxWidth = 900, quality = 0.75) {
    return new Promise((resolve, reject) => {
      if (!file) {
        resolve("");
        return;
      }

      const reader = new FileReader();
      const img = new Image();

      reader.onload = event => img.src = event.target.result;
      reader.onerror = reject;

      img.onload = () => {
        const canvas = document.createElement("canvas");
        const scale = Math.min(maxWidth / img.width, 1);
        canvas.width = Math.round(img.width * scale);
        canvas.height = Math.round(img.height * scale);

        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

        resolve(canvas.toDataURL("image/jpeg", quality));
      };

      img.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  fields.photo.addEventListener("change", async () => {
    const file = fields.photo.files[0];
    if (!file) {
      compressedImage = "";
      fields.preview.classList.add("hidden");
      return;
    }

    fields.status.textContent = "Compressing picture...";
    try {
      compressedImage = await resizeImage(file);
      fields.preview.src = compressedImage;
      fields.preview.classList.remove("hidden");
      fields.status.textContent = "Picture ready.";
    } catch (error) {
      fields.status.textContent = "Picture could not be loaded.";
      console.error(error);
    }
  });

  document.getElementById("saveCardBtn").addEventListener("click", async () => {
    const card = {
      id: Date.now(),
      playerName: fields.playerName.value.trim(),
      year: fields.year.value.trim(),
      brand: fields.brand.value.trim(),
      cardNumber: fields.cardNumber.value.trim(),
      condition: fields.condition.value.trim(),
      notes: fields.notes.value.trim(),
      image: compressedImage,
      createdAt: new Date().toISOString()
    };

    if (!card.playerName && !card.brand && !card.year) {
      alert("Add at least a player/card name, year, or brand before saving.");
      return;
    }

    try {
      await putCard(card);
      clearForm();
      await refreshCards();
      fields.status.textContent = "Card saved.";
    } catch (error) {
      alert("The card could not be saved. Try exporting a backup, then clearing Safari website data for this site.");
      console.error(error);
    }
  });

  document.getElementById("clearFormBtn").addEventListener("click", clearForm);

  function clearForm() {
    fields.playerName.value = "";
    fields.year.value = "";
    fields.brand.value = "";
    fields.cardNumber.value = "";
    fields.condition.value = "";
    fields.notes.value = "";
    fields.photo.value = "";
    compressedImage = "";
    fields.preview.src = "";
    fields.preview.classList.add("hidden");
  }

  window.deleteCard = async function(id) {
    if (!confirm("Delete this card?")) return;
    await deleteCardFromDB(id);
    await refreshCards();
  };

  function escapeHTML(text) {
    return String(text || "").replace(/[&<>"']/g, match => ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      '"': "&quot;",
      "'": "&#039;"
    }[match]));
  }

  async function refreshCards() {
    cards = await getAllCards();
    renderCards();
  }

  function renderCards() {
    fields.cards.innerHTML = "";
    fields.cardCount.textContent = `${cards.length} card${cards.length === 1 ? "" : "s"} saved`;

    if (!cards.length) {
      fields.cards.innerHTML = "<p class='status'>No cards saved yet.</p>";
      return;
    }

    cards.forEach(card => {
      const div = document.createElement("div");
      div.className = "collector-card";
      div.innerHTML = `
        ${card.image ? `<img src="${card.image}" alt="Card image">` : ""}
        <div class="content">
          <h3>${escapeHTML(card.playerName || "Unnamed Card")}</h3>
          <p><strong>Year:</strong> ${escapeHTML(card.year)}</p>
          <p><strong>Brand/Set:</strong> ${escapeHTML(card.brand)}</p>
          <p><strong>Card #:</strong> ${escapeHTML(card.cardNumber)}</p>
          <p><strong>Condition:</strong> ${escapeHTML(card.condition)}</p>
          <p>${escapeHTML(card.notes)}</p>
          <button class="danger" onclick="deleteCard(${card.id})">Delete</button>
        </div>
      `;
      fields.cards.appendChild(div);
    });
  }

  document.getElementById("exportBtn").addEventListener("click", () => {
    const data = JSON.stringify(cards, null, 2);
    const blob = new Blob([data], { type: "application/json" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "card-vault-backup.json";
    a.click();

    URL.revokeObjectURL(url);
  });

  document.getElementById("importBtn").addEventListener("click", () => {
    document.getElementById("importFile").click();
  });

  document.getElementById("importFile").addEventListener("change", event => {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = async e => {
      try {
        const imported = JSON.parse(e.target.result);
        if (!Array.isArray(imported)) throw new Error("Invalid backup file.");

        for (const card of imported) {
          if (!card.id) card.id = Date.now() + Math.random();
          await putCard(card);
        }

        await refreshCards();
        alert("Backup imported successfully.");
      } catch (error) {
        alert("That backup file could not be imported.");
        console.error(error);
      }
    };
    reader.readAsText(file);
  });

  async function startApp() {
    try {
      await openDB();
      await migrateOldLocalStorageCards();
      await refreshCards();
      fields.status.textContent = "Ready. IndexedDB storage is active.";
    } catch (error) {
      fields.status.textContent = "Storage could not start.";
      console.error(error);
    }
  }

  startApp();
</script>
</body>
</html>
